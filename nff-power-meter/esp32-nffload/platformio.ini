; nff-power-meter — ESP32 nff workload profile
;
; Prices each thing nff actually makes a device DO: idle, CPU, WiFi connect, connected-idle,
; a 1 MiB download, a 1 MiB flash write, and a full OTA (download + write together).
;
;   1. cp include/wifi_secrets.h.example include/wifi_secrets.h   and fill it in
;   2. pio run -t upload        <- over the ESP32's own USB
;   3. UNPLUG that USB before measuring (it shorts the shunt — see ../README.md rule 1)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -O2

; Two OTA partitions are required: the profile writes a megabyte into the *next* one to price a
; flash write, then aborts. The default single-app layout has nowhere to put it.
board_build.partitions = default.csv
