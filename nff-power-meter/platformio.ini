; nff power meter — STM32 Nucleo-F446RE
;
; Low-side shunt ammeter + energy accumulator. See README.md for wiring.
; Build/upload:  pio run -t upload
; The ST-Link's Virtual COM Port is the host link (`nff power` talks to it).

[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = arduino
upload_protocol = stlink

; Must match _BAUD in nff/nff/tools/power.py.
monitor_speed = 921600

; The 100 kSps DMA ISR is the hot path. (The HAL_*_MODULE_ENABLED defines the ADC/DMA/
; TIM code needs are already set by the core's stm32yyxx_hal_conf.h — redefining them
; here only produces warnings.)
build_flags = -O2
