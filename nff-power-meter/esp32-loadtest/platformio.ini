; nff-power-meter — ESP32 load test
;
; A four-step power staircase (idle / CPU / radio / scan) so `nff power selftest` can prove the
; shunt is really wired: a connected meter follows the steps, a floating one reads flat.
;
;   pio run -t upload     <- over the ESP32's own USB
;   then UNPLUG that USB before measuring (it shorts the shunt — see ../README.md rule 1)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -O2
